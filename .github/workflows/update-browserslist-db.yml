name: Update Browserslist DB

on:
  workflow_dispatch:
  schedule:
    # Run monthly at 03:17 UTC on the first day of the month.
    - cron: "17 3 1 * *"

permissions:
  contents: read

concurrency:
  group: update-browserslist-db
  cancel-in-progress: false

jobs:
  update:
    name: Update Browserslist DB
    runs-on: ubuntu-latest
    env:
      BASE_BRANCH: ${{ github.event.repository.default_branch }}
      GIT_COMMIT_AUTHOR: ${{ vars.ALLURE_CI_APP_SLUG }}[bot] <${{ vars.ALLURE_CI_APP_USER_ID }}+${{ vars.ALLURE_CI_APP_SLUG }}[bot]@users.noreply.github.com>
      NODE_VERSION: "24.x"
      UPDATE_BRANCH: chore/update-browserslist-db
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.ALLURE_CI_APP_CLIENT_ID }}
          private-key: ${{ secrets.ALLURE_CI_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: Reset stale update branch
        uses: actions/github-script@v9
        env:
          UPDATE_BRANCH: ${{ env.UPDATE_BRANCH }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const { owner, repo } = context.repo;
            const updateBranch = process.env.UPDATE_BRANCH;

            const openPulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              head: `${owner}:${updateBranch}`,
            });

            for (const pull of openPulls) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pull.number,
                body: "Closing this Browserslist DB update PR as stale. A fresh update PR will be generated by the next successful update run.",
              });

              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pull.number,
                state: "closed",
              });
            }

            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `heads/${updateBranch}`,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: allure-generator/package-lock.json

      - name: Install dependencies
        working-directory: allure-generator
        run: npm ci --no-audit

      - name: Update Browserslist DB
        working-directory: allure-generator
        run: npx -y -p update-browserslist-db@latest -p browserslist@latest update-browserslist-db

      - name: Verify updated install
        working-directory: allure-generator
        run: npm ci --no-audit

      - name: Check for changes
        id: changes
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build generator
        if: steps.changes.outputs.has_changes == 'true'
        working-directory: allure-generator
        run: npm run build

      - name: Create or update pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: ${{ env.UPDATE_BRANCH }}
          base: ${{ env.BASE_BRANCH }}
          commit-message: "chore: update Browserslist DB"
          title: "chore: update Browserslist DB"
          body: |
            Updates the Browserslist `caniuse-lite` database used by frontend build tooling.

            This keeps the resolved browser targets current for the existing support policy without changing that policy.
          committer: ${{ env.GIT_COMMIT_AUTHOR }}
          author: ${{ env.GIT_COMMIT_AUTHOR }}
          add-paths: |
            allure-generator/package-lock.json
