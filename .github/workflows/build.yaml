name: Build

permissions:
  contents: read

on:
  pull_request:
    branches:
      - '*'
  push:
    branches:
      - 'main'
      - 'hotfix-*'

jobs:
  build:
    name: "Build"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: [ '17' ]
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: ${{ matrix.java-version }}
          cache: 'gradle'
      - name: Build with Gradle
        run: ./gradlew build buildDeb buildRpm
      - name: Install Playwright browser
        run: cd allure-generator && npx playwright install --with-deps chromium
      - name: Run Playwright e2e
        run: ./gradlew :allure-generator:testE2E
      - name: Upload allure-commandline artifact
        uses: actions/upload-artifact@v7
        with:
          name: allure-commandline
          path: allure-commandline/build/install/allure-commandline
      - name: Upload allure-results artifact
        uses: actions/upload-artifact@v7
        with:
          name: allure-results
          path: allure-generator/tests/fixtures/raw/commandline-smoke
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: allure-generator/playwright-report
          if-no-files-found: ignore
  testcmd:
    name: "Test Allure Commandline"
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        java-version: [ '8', '11', '17', '20' ]
    steps:
      - name: Set up JRE ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          java-package: 'jre'
          distribution: 'zulu'
          java-version: ${{ matrix.java-version }}
      - name: Download allure-commandline artifact
        uses: actions/download-artifact@v8
        with:
          name: allure-commandline
      - name: Download allure-results artifact
        uses: actions/download-artifact@v8
        with:
          name: allure-results
          path: allure-results
      - name: Add execute permissions to script
        run: chmod +x ./bin/allure
      - name: Run version command
        run: ./bin/allure --version
      - name: Generate demo report
        run: ./bin/allure generate allure-results
